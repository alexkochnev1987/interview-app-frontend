name: Frontend CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # Note: For MVP, Amplify auto-builds from GitHub.
  # This deploy job is for when you need more control.
  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build

      - name: Deploy to Amplify
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          BRANCH: ${{ github.ref == 'refs/heads/main' && 'main' || 'develop' }}
        run: |
          # Create a deployment
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id $AMPLIFY_APP_ID \
            --branch-name $BRANCH \
            --query '{jobId: jobId, zipUploadUrl: zipUploadUrl}' \
            --output json)

          ZIP_URL=$(echo $DEPLOYMENT | jq -r '.zipUploadUrl')
          JOB_ID=$(echo $DEPLOYMENT | jq -r '.jobId')

          # Package the build
          cd .next && zip -r ../deploy.zip . && cd ..

          # Upload
          curl -T deploy.zip "$ZIP_URL"

          # Start deployment
          aws amplify start-deployment \
            --app-id $AMPLIFY_APP_ID \
            --branch-name $BRANCH \
            --job-id $JOB_ID
