name: Frontend CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Regenerate OpenAPI types from committed spec
        run: npm run openapi:generate
      - name: Ensure generated types match committed spec
        run: git diff --exit-code -- src/lib/api-types.ts
      - run: npm run lint:ci
      - run: npm run test
      - run: npx next build --webpack

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: interview_app
          POSTGRES_PASSWORD: localpass
          POSTGRES_DB: interview_app_e2e
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U interview_app -d interview_app_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: true
      BACKEND_REPO_PATH: interview-app-backend
      E2E_DATABASE_URL: postgresql://interview_app:localpass@localhost:5433/interview_app_e2e
      E2E_JWT_SECRET: ci-e2e-jwt-secret
      BACKEND_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:3001
      E2E_EMAIL: admin@interview-app.com
      E2E_PASSWORD: admin123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: alexkochnev1987/interview-app-backend
          ref: develop
          path: interview-app-backend
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        run: npm ci
      - name: Install backend dependencies
        working-directory: interview-app-backend
        run: npm ci
      - name: Build backend for E2E
        working-directory: interview-app-backend
        env:
          DATABASE_URL: postgresql://interview_app:localpass@localhost:5433/interview_app_e2e
          JWT_SECRET: ci-e2e-jwt-secret
          FRONTEND_URL: http://localhost:3001
          GOOGLE_CLIENT_ID: e2e-google-client-id
          GOOGLE_CLIENT_SECRET: e2e-google-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
          SUPER_ADMIN_EMAILS: admin@interview-app.com
          AWS_S3_BUCKET: interview-app-test
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          S3_ENDPOINT: http://localhost:9002
          S3_FORCE_PATH_STYLE: 'true'
        run: |
          npm run build
          if [ -f dist/src/database/migrate.js ]; then
            node dist/src/database/migrate.js
          elif [ -f dist/database/migrate.js ]; then
            node dist/database/migrate.js
          elif [ -f src/database/migrate.ts ]; then
            npx ts-node src/database/migrate.ts
          else
            echo "No migration entrypoint found"
            exit 1
          fi
      - name: Start backend for E2E
        working-directory: interview-app-backend
        env:
          DATABASE_URL: postgresql://interview_app:localpass@localhost:5433/interview_app_e2e
          JWT_SECRET: ci-e2e-jwt-secret
          FRONTEND_URL: http://localhost:3001
          GOOGLE_CLIENT_ID: e2e-google-client-id
          GOOGLE_CLIENT_SECRET: e2e-google-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
          SUPER_ADMIN_EMAILS: admin@interview-app.com
          AWS_S3_BUCKET: interview-app-test
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          S3_ENDPOINT: http://localhost:9002
          S3_FORCE_PATH_STYLE: 'true'
          PORT: '3000'
        run: |
          if [ -f dist/src/main.js ]; then
            node dist/src/main.js &
          else
            node dist/main.js &
          fi
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/health && exit 0
            sleep 2
          done
          echo "Backend failed to start"
          exit 1
      - name: Build frontend for E2E
        env:
          BACKEND_URL: http://localhost:3000
        run: npm run build
      - name: Start frontend for E2E
        env:
          BACKEND_URL: http://localhost:3000
        run: |
          npx next start -p 3001 --webpack &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3001/login && exit 0
            sleep 2
          done
          echo "Frontend failed to start"
          exit 1
      - name: Install Playwright Chromium
        run: npm run test:e2e:install
      - name: Run E2E smoke tests
        env:
          E2E_SKIP_WEBSERVER: '1'
        run: npm run test:e2e

# Deploy is handled by AWS Amplify auto-build (connected to GitHub repo).
# Amplify watches develop → dev, main → prod and builds automatically.
