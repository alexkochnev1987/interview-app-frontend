name: Frontend CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Regenerate OpenAPI types from committed spec
        run: npm run openapi:generate
      - name: Ensure generated types match committed spec
        run: git diff --exit-code -- src/lib/api-types.ts
      - run: npm run lint:ci
      - run: npm run test
      - run: npx next build --webpack
      - name: Upload production build for E2E
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          include-hidden-files: true
          retention-days: 1

  e2e:
    needs: test
    runs-on: ubuntu-latest
    env:
      CI: true
      BACKEND_URL: http://127.0.0.1:3000
      E2E_BASE_URL: http://127.0.0.1:3001
      E2E_PREBUILT: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      - name: Install Playwright Chromium
        run: npm run test:e2e:install
      - name: Run E2E smoke tests
        run: npm run test:e2e

# Deploy is handled by AWS Amplify auto-build (connected to GitHub repo).
# Amplify watches develop → dev, main → prod and builds automatically.
