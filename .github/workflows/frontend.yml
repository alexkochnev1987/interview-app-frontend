name: Frontend CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

# Deploy is handled by AWS Amplify auto-build (connected to GitHub repo).
# Amplify watches develop → dev, main → prod and builds automatically.
